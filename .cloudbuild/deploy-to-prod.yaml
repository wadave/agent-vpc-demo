steps:

  # Deploy Backend to Production
  - name: "gcr.io/cloud-builders/gcloud-slim"
    id: deploy-backend-prod
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "agent-starter-adk-cr-backend"
      - "--image"
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME"
      - "--region"
      - "$_REGION"
      - "--project"
      - $_PROD_PROJECT_ID

  # Deploy Frontend to Production
  - name: "gcr.io/cloud-builders/gcloud-slim"
    id: deploy-frontend-prod
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "agent-starter-adk-cr-frontend"
      - "--image"
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME-frontend"
      - "--region"
      - "$_REGION"
      - "--project"
      - $_PROD_PROJECT_ID

substitutions:
  _PROD_PROJECT_ID: YOUR_PROD_PROJECT_ID
  _REGION: us-central1

logsBucket: gs://${PROJECT_ID}-agent-starter-adk-cr-logs/build-logs
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
